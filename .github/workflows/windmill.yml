name: "Windmill: Integration Validation"

on:
  workflow_dispatch:


jobs:
  wmill-validation:
    name: "Windmill Lockfile & Lint Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Windmill CLI
        run: npm install -g windmill-cli

      - name: Verify Windmill Metadata & Lockfile
        working-directory: ./windmill
        run: |
          wmill generate-metadata --yes --base-url https://app.windmill.dev/ --token "${{ secrets.WMILL_TOKEN }}" --workspace bronownet
          git diff --exit-code

      - name: Run Windmill Lint
        working-directory: ./windmill
        run: wmill lint --base-url https://app.windmill.dev/ --token "${{ secrets.WMILL_TOKEN }}" --workspace bronownet

